name: CI
on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      APP_PORT: "8000"
      LOG_LEVEL: INFO
      POSTGRES_DSN: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/app
      REDIS_DSN: redis://127.0.0.1:6379/0
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        options: >-
          --health-cmd "pg_isready -U postgres -d app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.30"
          enable-cache: true
          cache-dependency-glob: uv.lock
      
      - name: Install dependencies
        run: uv sync --frozen
      
      - name: Install service clients
        run: sudo apt-get update && sudo apt-get install -y postgresql-client redis-tools
      
      - name: Wait for Postgres and Redis
        env:
          PGPASSWORD: postgres
        run: |
          for i in {1..30}; do
            pg_isready -h 127.0.0.1 -p 5432 -U postgres -d app && break
            sleep 2
          done
          pg_isready -h 127.0.0.1 -p 5432 -U postgres -d app

          for i in {1..30}; do
            redis-cli -h 127.0.0.1 -p 6379 ping | grep -q PONG && break
            sleep 2
          done
          redis-cli -h 127.0.0.1 -p 6379 ping | grep -q PONG
      
      - name: Lint
        run: uv run ruff check .
      
      - name: Test (Sprint 1)
        run: uv run pytest -m "(smoke or unit or integration) and not e2e and not load"

  docker:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - name: Derive image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Verify release tag commit is on main
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"

      - name: Build image for PRs and branch pushes
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ steps.image.outputs.name }}:ci

      - name: Login to GHCR
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.ref_name }}
            ${{ steps.image.outputs.name }}:latest
